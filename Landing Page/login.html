<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognitive Island | Portal Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-page {
            background-image: url('assets/images/Schooln.jpg');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: 80px;
        }
        
        .login-page::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(3, 7, 18, 0.7);
            z-index: 0;
        }
        
        .login-container {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            padding: 40px;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-tabs {
            display: flex;
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
            padding: 5px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
        }
        
        .login-tab {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        .login-tab.active {
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            color: #000;
            box-shadow: var(--glow-primary);
        }
        
        .login-form-container {
            display: none;
        }
        
        .login-form-container.active {
            display: block;
            animation: fadeIn 0.4s ease forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .login-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <!-- Interactive Dot Background -->
    <div class="dot-background"></div>

    <!-- Navigation -->
    <nav class="glass">
        <div class="logo">
            <span>🧠</span>
            <a href="index.html" class="text-gradient">Cognitive Island</a>
        </div>
        <div class="nav-actions">
            <a href="b2b.html" class="btn btn-secondary">← Back to Schools</a>
        </div>
    </nav>

    <div class="login-page">
        <div class="login-container glass-card">
            <div class="login-header">
                <h2>Portal Login</h2>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 5px;">Sign in with your registered account</p>
            </div>
            
            <div style="margin-top: 40px; margin-bottom: 20px;">
                <button type="button" class="btn btn-primary" onclick="window.handleGoogleLogin()" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 1.1rem; padding: 15px; background: #fff; color: #333; border: 1px solid #ddd; border-radius: 8px;">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" style="width: 24px;">
                    Continue with Google
                </button>
            </div>
            
            <div class="login-footer">
                <p style="color: var(--text-muted); font-size: 0.8rem;">Your portal will be selected automatically based on your email address.</p>
            </div>
        </div>
    </div>
    
    <script type="module">
        import { signInWithGoogle } from './firebase-config.js';
        window.handleGoogleLogin = signInWithGoogle;
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Interactive Dot Background Mouse Tracking
            document.addEventListener('mousemove', (e) => {
                document.documentElement.style.setProperty('--mouse-x', `${e.clientX}px`);
                document.documentElement.style.setProperty('--mouse-y', `${e.clientY}px`);
            });
        });
    </script>
</body>
</html>
