<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognitive Island | Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-page {
            background-image: url('assets/images/Schooln.jpg');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: 80px;
        }
        
        .login-page::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(3, 7, 18, 0.7);
            z-index: 0;
        }
        
        .login-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            padding: 40px;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-tabs {
            display: flex;
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
            padding: 5px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
        }
        
        .login-tab {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        .login-tab.active {
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            color: #000;
            box-shadow: var(--glow-primary);
        }
        
        .login-form-container {
            display: none;
        }
        
        .login-form-container.active {
            display: block;
            animation: fadeIn 0.4s ease forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .login-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="dot-background"></div>

    <nav class="glass">
        <div class="logo">
            <span>🧠</span>
            <a href="index.html" class="text-gradient">Cognitive Island</a>
        </div>
        <div class="nav-actions">
            <a href="login.html" class="btn btn-secondary">Already have an account? Login</a>
        </div>
    </nav>

    <div class="login-page">
        <div class="login-container glass-card">
            <div class="login-header">
                <h2>Create Account</h2>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 5px;">Join the island and start your journey</p>
            </div>
            
            <div class="login-tabs">
                <div class="login-tab active" data-tab="student">Student</div>
                <div class="login-tab" data-tab="teacher">Teacher</div>
            </div>
            
            <!-- Student Signup -->
            <div class="login-form-container active" id="form-student">
                <form>
                    <div class="form-group" style="display: flex; gap: 15px;">
                        <div style="flex: 1;">
                            <label>First Name</label>
                            <input type="text" class="form-control" placeholder="John" required>
                        </div>
                        <div style="flex: 1;">
                            <label>Last Name</label>
                            <input type="text" class="form-control" placeholder="Doe" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>School Access Code (Optional)</label>
                        <input type="text" class="form-control" placeholder="E.g. SCI-2026">
                    </div>
                    <div class="form-group">
                        <label>Email or Username</label>
                        <input type="text" class="form-control" placeholder="johndoe@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 15px;">Sign Up as Student</button>
                </form>
            </div>
            
            <!-- Teacher Signup -->
            <div class="login-form-container" id="form-teacher">
                <form>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" class="form-control" placeholder="Jane Smith" required>
                    </div>
                    <div class="form-group">
                        <label>Educator Email</label>
                        <input type="email" class="form-control" placeholder="teacher@school.edu" required>
                    </div>
                    <div class="form-group">
                        <label>School Name</label>
                        <input type="text" class="form-control" placeholder="Springfield High" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 15px; background: linear-gradient(90deg, #ff7e5f, #feb47b); box-shadow: 0 0 20px rgba(255,126,95,0.4); color: #fff;">Sign Up as Teacher</button>
                </form>
            </div>
            
            <div class="login-footer">
                <p>By signing up, you agree to our <a href="#" style="color: var(--primary-color);">Terms of Service</a></p>
            </div>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tabs = document.querySelectorAll('.login-tab');
            const forms = document.querySelectorAll('.login-form-container');
            
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    forms.forEach(f => f.classList.remove('active'));
                    
                    tab.classList.add('active');
                    const targetId = 'form-' + tab.getAttribute('data-tab');
                    document.getElementById(targetId).classList.add('active');
                });
            });
            
            document.addEventListener('mousemove', (e) => {
                document.documentElement.style.setProperty('--mouse-x', `${e.clientX}px`);
                document.documentElement.style.setProperty('--mouse-y', `${e.clientY}px`);
            });
        });
    </script>
</body>
</html>
