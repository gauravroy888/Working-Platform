    <!-- Lucide Icons -->

    <style>
        /* Hide scrollbar but keep functionality if needed */
        body { margin: 0; overflow: hidden; background-color: #050714; }
        
        /* New Shake & Clap Animations */
        @keyframes power-shake {
            0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
            10% { transform: translate(-4px, -4px) rotate(-2deg) scale(1.02); }
            20% { transform: translate(4px, 4px) rotate(2deg) scale(0.98); }
            30% { transform: translate(-4px, 4px) rotate(-2deg) scale(1.02); }
            40% { transform: translate(4px, -4px) rotate(2deg) scale(0.98); }
            50% { transform: translate(-2px, -2px) rotate(-1deg) scale(1.01); }
            60% { transform: translate(2px, 2px) rotate(1deg) scale(0.99); }
            70% { transform: translate(-2px, 2px) rotate(-1deg) scale(1.01); }
            80% { transform: translate(2px, -2px) rotate(1deg) scale(0.99); }
        }
        .animate-power-shake {
            animation: power-shake 0.6s ease-out;
        }

        @keyframes clap-bounce {
            0%, 100% { transform: translateY(0) scale(1) rotate(0deg); }
            50% { transform: translateY(-15px) scale(1.2) rotate(10deg); }
        }
        .animate-clap {
            animation: clap-bounce 0.4s ease-in-out alternate infinite;
        }
    </style>
</head>

        // --- Sound Engine (Web Audio API Synthesizer) ---
        const getAudioCtx = () => {
            if (typeof window === 'undefined') return null;
            if (!window.audioCtx) window.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            return window.audioCtx;
        };

            init: () => {
                const ctx = getAudioCtx();
                if (ctx && ctx.state === 'suspended') ctx.resume();
            },
            playTone: (freq, type, duration, vol = 0.1, sweepFreq = null) => {
                const ctx = getAudioCtx();
                if (!ctx) return;
                if (ctx.state === 'suspended') ctx.resume();
                
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.type = type;
                osc.connect(gain);
                gain.connect(ctx.destination);

                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                if (sweepFreq) {
                    osc.frequency.exponentialRampToValueAtTime(sweepFreq, ctx.currentTime + duration);
                }

                gain.gain.setValueAtTime(vol, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);

                osc.start();
                osc.stop(ctx.currentTime + duration);
            },

                const ctx = getAudioCtx();
                if (!ctx) return;
                if (ctx.state === 'suspended') ctx.resume();
                
                const bufferSize = ctx.sampleRate * 0.15; // 150ms noise burst
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                
                const noise = ctx.createBufferSource();
                noise.buffer = buffer;

                const filter = ctx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 1200;
                filter.Q.value = 0.5; 

                const gain = ctx.createGain();
                gain.gain.setValueAtTime(0.5, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);

                noise.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);
                noise.start();
            },

                for (let i = 0; i < 20; i++) {
                    setTimeout(SoundEngine.clap, Math.random() * 1200);

                    n1: { id: 'n1', x: 50, y: 90, type: 'slot', accepts: 'battery', posTarget: 's1', negTarget: 's2', component: null },
                    s1: { id: 's1', x: 30, y: 70, type: 'slot', accepts: 'switch', component: null },
                    s2: { id: 's2', x: 70, y: 70, type: 'slot', accepts: 'switch', component: null },
                    s3: { id: 's3', x: 10, y: 50, type: 'slot', accepts: 'switch', component: null },
                    s4: { id: 's4', x: 90, y: 50, type: 'slot', accepts: 'switch', component: null },
                    s5: { id: 's5', x: 30, y: 30, type: 'slot', accepts: 'switch', component: null },
                    s6: { id: 's6', x: 70, y: 30, type: 'slot', accepts: 'switch', component: null },
                    s7: { id: 's7', x: 50, y: 50, type: 'slot', accepts: 'switch', component: null }, 
                    s8: { id: 's8', x: 50, y: 30, type: 'slot', accepts: 'switch', component: null }, 
                    bulb: { id: 'bulb', x: 50, y: 10, type: 'bulb', component: 'bulb' }
                },
                edges: [
                    ['n1', 's1'], ['n1', 's2'],
                    ['s1', 's3'], ['s3', 's5'], ['s5', 'bulb'], 
                    ['s2', 's4'], ['s4', 's6'], ['s6', 'bulb'], 
                    ['s1', 's7'], ['s7', 's6'], 
                    ['s2', 's7'], ['s7', 's5'], 
                    ['s3', 's7'], ['s4', 's7'], 
                    ['s5', 's8'], ['s8', 's6']  
                ],
                inventory: { battery: 1, switch: 8 } 
            }
        ];

        // Core Dual-Terminal Simulation Engine
        const simulate = (nodesArray, edgesArray) => {
            const nodes = JSON.parse(JSON.stringify(nodesArray));
            const edgeStates = {}; 

            Object.keys(nodes).forEach(k => {
                nodes[k].powerRed = false;
                nodes[k].powerBlue = false;
            });

            const propagate = (startNodeId, powerField, colorVal) => {
                let queue = [startNodeId];
                nodes[startNodeId][powerField] = true;

                while (queue.length > 0) {
                    let currId = queue.shift();
                    let currNode = nodes[currId];

                    if (currNode.type === 'slot') {
                        if (!currNode.component) continue; 
                        if (currNode.component === 'switch' && !currNode.isOn) continue; 
                        if (currNode.component === 'battery') continue; 
                    }
                    if (currNode.type === 'bulb') continue;

                    let connectedEdges = edgesArray.filter(e => e[0] === currId || e[1] === currId);
                    connectedEdges.forEach(edge => {
                        let neighborId = edge[0] === currId ? edge[1] : edge[0];
                        let edgeKey = getEdgeKey(edge[0], edge[1]);

                        if (edgeStates[edgeKey] && edgeStates[edgeKey] !== colorVal) {
                            edgeStates[edgeKey] = 'purple';
                        } else {
                            edgeStates[edgeKey] = colorVal;
                        }

                        if (!nodes[neighborId][powerField]) {
                            nodes[neighborId][powerField] = true;
                            queue.push(neighborId);
                        }
                    });
                }
            };

            Object.values(nodes).forEach(n => {
                if (n.component === 'battery') {
                    n.powerRed = true;
                    n.powerBlue = true;
                    if (n.posTarget) propagate(n.posTarget, 'powerBlue', 'blue'); 
                    if (n.negTarget) propagate(n.negTarget, 'powerRed', 'red');  
                }
            });

            let isShortCircuit = false;

            Object.values(nodes).forEach(n => {
                if (n.powerBlue && n.powerRed) {
                    if (n.type === 'wire') {
                        isShortCircuit = true;
                    } else if (n.type === 'slot' && n.component === 'switch' && n.isOn) {
                        isShortCircuit = true;
                    }
                }
            });

            return { simulatedNodes: nodes, edgeStates, isShortCircuit };
        };

        // --- App State ---
        let appState = 'start'; 
        let gameMode = 'timed'; 
        let currentLang = 'en'; // 'en' or 'hi'
        let currentLevelIndex = 0;
        let nodes = {};
        let edgeStates = {};
        let inventory = {};
        let selectedItem = null;
        
        let isWon = false;
        let isShortCircuit = false;
        let isMissingSwitches = false;
        let isTimeUp = false;
        let timeLeft = 30;
        let timerInterval = null;

        // --- Actions ---
        window.setLang = (lang) => {
            if (currentLang !== lang) {
                SoundEngine.uiClick();
                currentLang = lang;
                renderApp();
            }
        };

        window.setGameMode = (mode) => {
            SoundEngine.uiClick();
            gameMode = mode;
            renderApp();
        };

        window.startGame = () => {
            SoundEngine.init();
            SoundEngine.startPlay();
            appState = 'playing';
            loadLevel(0);
        };

        window.goToMenu = () => {
            SoundEngine.uiClick();
            stopTimer();
            appState = 'start';
            renderApp();
        };

        const loadLevel = (index) => {
            const levelData = levels[index];
            currentLevelIndex = index;
            nodes = JSON.parse(JSON.stringify(levelData.nodes));
            inventory = { ...levelData.inventory };
            edgeStates = {};
            selectedItem = null;
            isWon = false;
            isShortCircuit = false;
            isMissingSwitches = false;
            isTimeUp = false;
            timeLeft = 30;
            renderApp();
            startTimer();
        };

        const applyStateChange = (updatedNodes) => {
            const result = simulate(updatedNodes, levels[currentLevelIndex].edges);
            nodes = result.simulatedNodes;
            edgeStates = result.edgeStates;
            
            // Handle audio triggers once
            if (!isShortCircuit && result.isShortCircuit) SoundEngine.shortCircuit();
            isShortCircuit = result.isShortCircuit;
            
            const bulbId = Object.keys(nodes).find(k => nodes[k].type === 'bulb');
            const isLit = !isShortCircuit && bulbId && nodes[bulbId].powerRed && nodes[bulbId].powerBlue;
            
            const placedSwitches = Object.values(nodes).filter(n => n.component === 'switch').length;
            const totalSwitches = levels[currentLevelIndex].inventory.switch;

            let newlyWon = false;
            if (isLit) {
                if (placedSwitches >= totalSwitches) {
                    isMissingSwitches = false;
                    newlyWon = true;
                } else {
                    isWon = false;
                    isMissingSwitches = true; 
                }
            } else {
                isWon = false;
                isMissingSwitches = false;
            }

            renderApp(); // Render before win delay

            if (newlyWon) {
                setTimeout(() => {
                    isWon = true;
                    SoundEngine.win();
                    if (currentLevelIndex === levels.length - 1) {
                        SoundEngine.crowdClap(); // Trigger the synthesized clapping only on last level
                    }
                    renderApp();
                }, 500);
            }
        };

        window.setSelectedItem = (item) => {
            if (inventory[item] > 0) {
                SoundEngine.uiClick();
                selectedItem = (selectedItem === item) ? null : item;
                renderApp();
            }
        };

        window.handleSlotClick = (nodeId) => {
            if (isWon || isTimeUp) return;
            const node = nodes[nodeId];

            if (!node.component && selectedItem && node.accepts === selectedItem && inventory[selectedItem] > 0) {
                SoundEngine.place(); 
                nodes[nodeId].component = selectedItem;
                nodes[nodeId].isOn = false;
                inventory[selectedItem] -= 1;
                selectedItem = null;
                applyStateChange(nodes);
            }
        };

        window.handleToggle = (nodeId) => {
            if (isWon || isTimeUp) return;
            SoundEngine.toggle(); 
            nodes[nodeId].isOn = !nodes[nodeId].isOn;
            applyStateChange(nodes);
        };

        window.handleRemove = (e, nodeId) => {
            e.stopPropagation();
            if (isWon || isTimeUp) return;
            const node = nodes[nodeId];
            if (node.fixed) return; 
            if (node.component) {
                SoundEngine.remove(); 
                const compType = node.component;
                nodes[nodeId].component = null;
                nodes[nodeId].isOn = false;
                inventory[compType] += 1;
                applyStateChange(nodes);
            }
        };

        window.resetLevel = () => {
            SoundEngine.uiClick();
            loadLevel(currentLevelIndex);
        };
        
        window.nextLevel = () => {
            SoundEngine.uiClick();
            if (currentLevelIndex < levels.length - 1) loadLevel(currentLevelIndex + 1);
            else loadLevel(0); 
        };

        const stopTimer = () => {
            if(timerInterval) clearInterval(timerInterval);
        };

        const startTimer = () => {
            stopTimer();
            timerInterval = setInterval(() => {
                if (appState !== 'playing' || gameMode !== 'timed') return;
                if (isWon || isShortCircuit || isTimeUp) return;
                
                if (timeLeft <= 0) {
                    isTimeUp = true;
                    SoundEngine.timeUp();
                    renderApp();
                    return;
                }
                timeLeft -= 1;
                
                // Fast update for timer specifically
                const timerEl = document.getElementById('timer-text');
                const timerWrapper = document.getElementById('timer-wrapper');
                if (timerEl && timerWrapper) {
                    timerEl.innerText = `0:${timeLeft.toString().padStart(2, '0')}`;
                    if (timeLeft <= 5) {
                        timerWrapper.className = `flex items-center gap-2 text-[#E27329] animate-pulse drop-shadow-[0_0_10px_rgba(226,115,41,0.8)]`;
                    }
                }
            }, 1000);
        };

        // --- Rendering ---
        const renderLangToggle = () => {
            return `
                <div class="flex bg-black/40 border border-white/20 rounded-full p-1 shadow-inner">
                    <button onclick="window.setLang('en')" class="px-3 py-1 rounded-full text-xs font-bold transition-all ${currentLang === 'en' ? 'bg-[#E27329] text-white shadow-md' : 'text-[#A0A3B5] hover:text-white'}">EN</button>
                    <button onclick="window.setLang('hi')" class="px-3 py-1 rounded-full text-xs font-bold transition-all ${currentLang === 'hi' ? 'bg-[#E27329] text-white shadow-md' : 'text-[#A0A3B5] hover:text-white'}">HI</button>
                </div>
            `;
        };

        const renderStartScreen = () => {
            const l = t[currentLang];
            return `
                <div class="absolute inset-0 pointer-events-none opacity-20 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHBhdGggZD0iTTAgMGg0MHY0MEgweiIgZmlsbD0ibm9uZSIvPjxwYXRoIGQ9Ik0wIDM5LjVoNDBWMGgtMXYzOWgtMzl6IiBmaWxsPSJyZ2JhKDI1NSwyNTUsMjU1LDAuMSkiLz48L3N2Zz4=')] bg-repeat"></div>
                <div class="absolute inset-0 pointer-events-none opacity-40 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MDAiIGhlaWdodD0iNDAwIj4KICA8Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSIxIiBmaWxsPSIjZmZmIiAvPgogIDxjaXJjbGUgY3g9IjI1MCIgY3k9IjE1MCIgcj0iMSIgZmlsbD0iI2ZmZiIgLz4KICA8Y2lyY2xlIGN4PSIzNTAiIGN5PSIzMDAiIHI9IjEiIGZpbGw9IiNmZmYiIC8+Cjwvc3ZnPg==')] bg-repeat"></div>

                <div class="z-10 bg-white/10 backdrop-blur-2xl border border-white/20 rounded-[32px] p-10 sm:p-16 shadow-[0_8px_32px_rgba(0,0,0,0.5)] flex flex-col items-center max-w-2xl w-full text-white relative">
                    
                    <div class="absolute top-6 right-6">
                        ${renderLangToggle()}
                    </div>

                    <i data-lucide="circuit-board" class="w-20 h-20 text-[#7C9BFF] mb-6 drop-shadow-[0_0_15px_rgba(124,155,255,0.5)]"></i>
                    <h1 class="text-4xl sm:text-5xl font-bold tracking-widest mb-2 drop-shadow-md text-center">${l.title}</h1>
                    <p class="text-[#A0A3B5] text-lg mb-10 text-center">${l.subtitle}</p>

                    <div class="flex flex-col sm:flex-row gap-6 w-full mb-10">
                        <div onclick="window.setGameMode('timed')" class="flex-1 p-6 rounded-[20px] border-2 cursor-pointer transition-all duration-300 flex flex-col items-center gap-3 ${gameMode === 'timed' ? 'bg-[#3B58CB]/20 border-[#7C9BFF] shadow-[0_0_20px_rgba(59,88,203,0.3)] scale-105' : 'bg-white/5 border-transparent hover:bg-white/10'}">
                            <i data-lucide="hourglass" class="w-10 h-10 ${gameMode === 'timed' ? 'text-[#7C9BFF]' : 'text-white/50'}"></i>
                            <span class="font-bold tracking-wider ${gameMode === 'timed' ? 'text-white' : 'text-white/70'}">${l.timedMode}</span>
                            <span class="text-[#A0A3B5] text-sm text-center">${l.timedDesc}</span>
                        </div>
                        <div onclick="window.setGameMode('relaxed')" class="flex-1 p-6 rounded-[20px] border-2 cursor-pointer transition-all duration-300 flex flex-col items-center gap-3 ${gameMode === 'relaxed' ? 'bg-[#3B58CB]/20 border-[#7C9BFF] shadow-[0_0_20px_rgba(59,88,203,0.3)] scale-105' : 'bg-white/5 border-transparent hover:bg-white/10'}">
                            <i data-lucide="infinity" class="w-10 h-10 ${gameMode === 'relaxed' ? 'text-[#7C9BFF]' : 'text-white/50'}"></i>
                            <span class="font-bold tracking-wider ${gameMode === 'relaxed' ? 'text-white' : 'text-white/70'}">${l.zenMode}</span>
                            <span class="text-[#A0A3B5] text-sm text-center">${l.zenDesc}</span>
                        </div>
                    </div>

                    <button onclick="window.startGame()" class="flex items-center gap-3 px-12 py-5 bg-[#3B58CB] hover:bg-[#4A6BF0] text-white font-bold text-xl rounded-[16px] tracking-widest transition-all shadow-[0_4px_20px_rgba(59,88,203,0.5)] hover:shadow-[0_4px_30px_rgba(124,155,255,0.6)]">
                        <i data-lucide="play-circle" class="w-6 h-6"></i>
                        ${l.startSystem}
                    </button>
                </div>
            `;
        };

        const renderGameScreen = () => {
            const l = t[currentLang];
            const levelData = levels[currentLevelIndex];
            const levelName = l.levels[levelData.name] || levelData.name;
            
            // Build Timer / Zen UI
            let timerHTML = '';
            if (gameMode === 'timed') {
                let timerClasses = timeLeft <= 5 ? 'text-[#E27329] animate-pulse drop-shadow-[0_0_10px_rgba(226,115,41,0.8)]' : 'text-white drop-shadow-md';
                timerHTML = `
                    <div id="timer-wrapper" class="flex items-center gap-2 ${timerClasses}">
                        <i data-lucide="timer" class="w-6 h-6"></i>
                        <span id="timer-text" class="font-mono font-bold text-2xl tracking-widest">0:${timeLeft.toString().padStart(2, '0')}</span>
                    </div>
                `;
            } else {
                timerHTML = `
                    <div class="flex items-center gap-2 text-white/50 drop-shadow-md">
                        <i data-lucide="infinity" class="w-6 h-6"></i>
                        <span class="font-bold text-xl tracking-widest uppercase">ZEN</span>
                    </div>
                `;
            }

            // Build Inventory UI
            let invBatteryClass = inventory.battery > 0 ? 'cursor-pointer' : 'opacity-50 cursor-not-allowed';
            let selBatteryClass = selectedItem === 'battery' ? 'bg-[#3B58CB]/40 border-2 border-[#7C9BFF] shadow-[0_0_20px_rgba(59,88,203,0.5)] scale-105' : 'bg-white/5 border-2 border-transparent hover:bg-white/10 hover:border-white/10 hover:scale-[1.02]';
            let txtBatteryClass = selectedItem === 'battery' ? 'text-[#7C9BFF]' : 'text-white';

            let invSwitchClass = inventory.switch > 0 ? 'cursor-pointer' : 'opacity-50 cursor-not-allowed';
            let selSwitchClass = selectedItem === 'switch' ? 'bg-[#3B58CB]/40 border-2 border-[#7C9BFF] shadow-[0_0_20px_rgba(59,88,203,0.5)] scale-105' : 'bg-white/5 border-2 border-transparent hover:bg-white/10 hover:border-white/10 hover:scale-[1.02]';
            let txtSwitchClass = selectedItem === 'switch' ? 'text-[#7C9BFF]' : 'text-white';

            // Build Edges (SVG)
            let edgesHTML = levelData.edges.map(edge => {
                const n1 = nodes[edge[0]];
                const n2 = nodes[edge[1]];
                if (!n1 || !n2) return '';
                const edgeKey = getEdgeKey(edge[0], edge[1]);
                const color = edgeStates[edgeKey];
                
                let strokeColor = 'rgba(255, 255, 255, 0.25)'; 
                let filter = '';
                if (color === 'blue') { strokeColor = '#3B58CB'; filter = 'url(#neonGlowBlue)'; }
                else if (color === 'red') { strokeColor = '#EF4444'; filter = 'url(#neonGlowRed)'; }
                else if (color === 'purple') { strokeColor = '#A855F7'; filter = 'url(#neonGlowPurple)'; }

                let pulseClass = (isShortCircuit && color === 'purple') ? 'animate-pulse' : '';

                return `
                    <g>
                        <line x1="${n1.x}%" y1="${n1.y}%" x2="${n2.x}%" y2="${n2.y}%" stroke="rgba(255, 255, 255, 0.25)" stroke-width="12" stroke-linecap="round"></line>
                        <line x1="${n1.x}%" y1="${n1.y}%" x2="${n2.x}%" y2="${n2.y}%" stroke="${strokeColor}" stroke-width="4" stroke-linecap="round" filter="${filter}" class="transition-all duration-500 ease-in-out ${pulseClass}"></line>
                    </g>
                `;
            }).join('');

            // Build Nodes (HTML)
            let nodesHTML = Object.values(nodes).map(node => {
                let style = `left: ${node.x}%; top: ${node.y}%; transform: translate(-50%, -50%);`;

                if (node.type === 'wire') {
                    let bgClass = 'bg-white/40 border border-white/20 shadow-[0_0_10px_rgba(255,255,255,0.1)]'; 
                    if (node.powerBlue && node.powerRed) bgClass = 'bg-[#A855F7] shadow-[0_0_15px_#A855F7] border-transparent';
                    else if (node.powerBlue) bgClass = 'bg-[#7C9BFF] shadow-[0_0_15px_#3B58CB] border-transparent';
                    else if (node.powerRed) bgClass = 'bg-[#FF7A7A] shadow-[0_0_15px_#EF4444] border-transparent';

                    let pingClass = (isShortCircuit && node.powerBlue && node.powerRed) ? 'animate-ping' : '';
                    return `<div class="absolute w-3 h-3 rounded-full z-10 transition-all duration-500 ${bgClass} ${pingClass}" style="${style}"></div>`;
                }

                if (node.type === 'bulb') {
                    const isLit = !isShortCircuit && node.powerRed && node.powerBlue;
                    let wClass = isLit ? 'bg-[#E27329]/80 shadow-[0_0_40px_#E27329] border border-[#E27329]' : 'bg-white/10 border border-white/30 shadow-lg';
                    let iClass = isLit ? 'text-white drop-shadow-[0_0_10px_white]' : 'text-white/50';
                    let tClass = isLit ? 'text-[#E27329] drop-shadow-md' : 'text-white/60';
                    return `
                        <div class="absolute z-20 flex flex-col items-center" style="${style}">
                            <div class="w-20 h-20 rounded-[20px] backdrop-blur-md flex items-center justify-center transition-all duration-1000 ${wClass}">
                                <i data-lucide="lightbulb" class="w-10 h-10 transition-all duration-700 ${iClass}"></i>
                            </div>
                            <div class="mt-3 text-xs font-semibold tracking-wider transition-colors duration-500 ${tClass}">${l.goal}</div>
                        </div>
                    `;
                }

                if (node.type === 'slot') {
                    const isEmpty = !node.component;
                    const isHoverTarget = selectedItem && node.accepts === selectedItem && isEmpty;

                    if (isEmpty) {
                        let outerCls = isHoverTarget ? 'border-[#7C9BFF] bg-[#3B58CB]/30 cursor-pointer scale-110 shadow-[0_0_20px_rgba(59,88,203,0.5)]' : 'border-dashed border-white/40 bg-white/5 hover:bg-white/10 hover:border-white/60 cursor-pointer';
                        let innerCls = isHoverTarget ? 'border-[#7C9BFF]' : 'border-white/40';
                        return `
                            <div class="absolute z-20" style="${style}">
                                <div onclick="window.handleSlotClick('${node.id}')" class="w-16 h-16 rounded-[16px] border-2 backdrop-blur-md flex items-center justify-center transition-all duration-300 ${outerCls}">
                                    <div class="w-6 h-6 rounded-full border-2 ${innerCls}"></div>
                                </div>
                            </div>
                        `;
                    } else {
                        let compHTML = '';
                        if (node.component === 'battery') {
                            let borderClass = node.powerBlue ? 'border border-white/50' : 'border border-white/20';
                            compHTML = `
                                <div class="w-full h-full rounded-[16px] overflow-hidden flex shadow-xl backdrop-blur-lg ${borderClass}">
                                    <div class="w-1/2 h-full bg-[#3B58CB]/80 flex items-center justify-center">
                                        <span class="text-white font-bold text-sm mb-4 opacity-90 drop-shadow-md">+</span>
                                    </div>
                                    <div class="w-1/2 h-full bg-[#EF4444]/80 flex items-center justify-center">
                                        <span class="text-white font-bold text-sm mb-4 opacity-90 drop-shadow-md">-</span>
                                    </div>
                                    <div class="absolute inset-0 flex items-center justify-center pt-2 pointer-events-none">
                                        <i data-lucide="battery" class="w-6 h-6 text-white drop-shadow-lg"></i>
                                    </div>
                                </div>
                            `;
                        } else if (node.component === 'switch') {
                            let switchBg = 'bg-white/10 backdrop-blur-md border border-white/30 shadow-lg';
                            let switchIcon = `<i data-lucide="toggle-left" class="w-8 h-8 text-white/60"></i>`;

                            if (node.isOn) {
                                if (node.powerBlue && node.powerRed) {
                                    switchBg = 'bg-[#A855F7]/80 backdrop-blur-md shadow-[0_0_20px_#A855F7] border border-white/50';
                                } else if (node.powerBlue) {
                                    switchBg = 'bg-[#3B58CB]/80 backdrop-blur-md shadow-[0_0_20px_#3B58CB] border border-white/50';
                                } else if (node.powerRed) {
                                    switchBg = 'bg-[#EF4444]/80 backdrop-blur-md shadow-[0_0_20px_#EF4444] border border-white/50';
                                } else {
                                    switchBg = 'bg-[#E27329]/80 backdrop-blur-md shadow-[0_0_20px_#E27329] border border-white/50';
                                }
                                switchIcon = `<i data-lucide="toggle-right" class="w-8 h-8 text-white drop-shadow-md"></i>`;
                            } else {
                                if (node.powerBlue && node.powerRed) {
                                    switchBg = 'bg-white/10 backdrop-blur-md border border-[#A855F7] shadow-[0_0_15px_rgba(168,85,247,0.4)]';
                                } else if (node.powerBlue) {
                                    switchBg = 'bg-white/10 backdrop-blur-md border border-[#3B58CB] shadow-[0_0_15px_rgba(59,88,203,0.4)]';
                                } else if (node.powerRed) {
                                    switchBg = 'bg-white/10 backdrop-blur-md border border-[#EF4444] shadow-[0_0_15px_rgba(239,68,68,0.4)]';
                                }
                            }

                            let pulseClass = (isShortCircuit && node.powerBlue && node.powerRed) ? 'animate-pulse' : '';
                            compHTML = `
                                <div onclick="window.handleToggle('${node.id}')" class="w-full h-full rounded-[16px] cursor-pointer transition-all duration-300 flex items-center justify-center ${switchBg} ${pulseClass}">
                                    ${switchIcon}
                                </div>
                            `;
                        }

                        let remBtn = '';
                        if (!isWon && !isTimeUp && !node.fixed) {
                            remBtn = `
                                <button onclick="window.handleRemove(event, '${node.id}')" class="absolute -top-3 -right-3 w-8 h-8 rounded-full bg-[#EF4444]/90 backdrop-blur-md hover:bg-red-500 text-white flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all shadow-[0_4px_10px_rgba(0,0,0,0.5)] border border-white/20 z-30 scale-75 group-hover:scale-100">
                                    <i data-lucide="x" class="w-4 h-4"></i>
                                </button>
                            `;
                        }

                        return `
                            <div class="absolute z-20" style="${style}">
                                <div class="relative w-16 h-16 group">
                                    ${compHTML}
                                    ${remBtn}
                                </div>
                            </div>
                        `;
                    }
                }
                return '';
            }).join('');

            // Build Overlays
            let overlaysHTML = '';
            if (isShortCircuit && !isWon) {
                overlaysHTML += `
                    <div class="absolute inset-0 z-40 bg-black/40 backdrop-blur-sm flex items-center justify-center pointer-events-none animate-in fade-in duration-300">
                        <div class="bg-white/10 backdrop-blur-2xl px-10 py-6 rounded-[24px] border border-[#EF4444]/50 shadow-[0_8px_32px_rgba(239,68,68,0.4)] flex flex-col items-center">
                            <i data-lucide="alert-triangle" class="w-12 h-12 text-[#FF7A7A] mb-2 drop-shadow-md"></i>
                            <span class="text-white font-semibold text-2xl drop-shadow-md">${l.shortCircuit}</span>
                            <span class="text-white/80 mt-1 font-medium text-sm">${l.shortCircuitDesc}</span>
                        </div>
                    </div>
                `;
            }

            if (isTimeUp && !isWon && !isShortCircuit) {
                overlaysHTML += `
                    <div class="absolute inset-0 z-40 bg-black/40 backdrop-blur-md flex flex-col items-center justify-center animate-in fade-in duration-300">
                        <div class="bg-white/10 backdrop-blur-2xl px-12 py-8 rounded-[24px] border border-white/20 shadow-[0_8px_32px_rgba(0,0,0,0.5)] flex flex-col items-center text-center">
                            <i data-lucide="timer" class="w-16 h-16 text-white/80 mb-4"></i>
                            <span class="text-white font-semibold text-2xl mb-1 drop-shadow-md">${l.sysShutdown}</span>
                            <span class="text-white/80 font-medium text-sm mb-6">${l.timeOut}</span>
                            <button onclick="window.resetLevel()" class="px-6 py-3 bg-white/20 hover:bg-white/30 border border-white/30 text-white font-medium rounded-[12px] transition-all pointer-events-auto shadow-lg">
                                ${l.retry}
                            </button>
                        </div>
                    </div>
                `;
            }

            if (isMissingSwitches && !isWon && !isTimeUp) {
                overlaysHTML += `
                    <div class="absolute inset-0 z-40 bg-black/40 backdrop-blur-sm flex items-center justify-center pointer-events-none animate-in fade-in duration-300">
                        <div class="bg-white/10 backdrop-blur-2xl px-10 py-6 rounded-[24px] border border-[#E27329]/50 shadow-[0_8px_32px_rgba(226,115,41,0.4)] flex flex-col items-center text-center max-w-sm">
                            <i data-lucide="alert-triangle" class="w-12 h-12 text-[#E27329] mb-2 drop-shadow-md"></i>
                            <span class="text-white font-semibold text-xl drop-shadow-md">${l.incomplete}</span>
                            <span class="text-white/80 mt-2 text-sm leading-relaxed">${l.incompleteDesc}</span>
                        </div>
                    </div>
                `;
            }

            if (isWon) {
                let isGameComplete = currentLevelIndex === levels.length - 1;
                let btnTxt = isGameComplete ? l.playAgain : l.nextSector;
                let shakeClass = isGameComplete ? "animate-power-shake" : "";
                
                let iconSection = isGameComplete ? `
                    <div class="flex items-end gap-6 mb-6">
                        <span class="text-5xl animate-clap drop-shadow-lg" style="animation-delay: 0ms">👏</span>
                        <div class="w-24 h-24 bg-[#E27329]/80 backdrop-blur-md rounded-[20px] border border-white/30 flex items-center justify-center shadow-[0_0_40px_rgba(226,115,41,0.6)]">
                            <i data-lucide="lightbulb" class="w-12 h-12 text-white drop-shadow-md"></i>
                        </div>
                        <span class="text-5xl animate-clap drop-shadow-lg" style="animation-delay: 250ms">👏</span>
                    </div>
                ` : `
                    <div class="w-24 h-24 bg-[#E27329]/80 backdrop-blur-md rounded-[20px] border border-white/30 flex items-center justify-center mb-6 shadow-[0_0_40px_rgba(226,115,41,0.6)]">
                        <i data-lucide="lightbulb" class="w-12 h-12 text-white drop-shadow-md"></i>
                    </div>
                `;

                overlaysHTML += `
                    <div class="absolute inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-md animate-in fade-in duration-500">
                        <div class="bg-white/10 backdrop-blur-2xl p-10 rounded-[24px] border border-white/20 shadow-[0_8px_32px_rgba(0,0,0,0.5)] flex flex-col items-center text-center transform transition-all scale-100 animate-in zoom-in-95 duration-500 ${shakeClass}">
                            ${iconSection}
                            <h2 class="text-2xl font-semibold text-white mb-2 drop-shadow-md">${l.circuitClosed}</h2>
                            <p class="text-white/80 text-sm mb-8">${l.powerPerfect}</p>
                            <button onclick="window.nextLevel()" class="px-8 py-3 bg-white/20 hover:bg-white/30 border border-white/30 text-white font-medium rounded-[12px] transition-all shadow-[0_4px_20px_rgba(0,0,0,0.3)] pointer-events-auto hover:shadow-[0_4px_25px_rgba(255,255,255,0.2)]">
                                ${btnTxt}
                            </button>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="absolute inset-0 pointer-events-none opacity-20 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHBhdGggZD0iTTAgMGg0MHY0MEgweiIgZmlsbD0ibm9uZSIvPjxwYXRoIGQ9Ik0wIDM5LjVoNDBWMGgtMXYzOWgtMzl6IiBmaWxsPSJyZ2JhKDI1NSwyNTUsMjU1LDAuMSkiLz48L3N2Zz4=')] bg-repeat"></div>
                <div class="absolute inset-0 pointer-events-none opacity-40 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MDAiIGhlaWdodD0iNDAwIj4KICA8Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSIxIiBmaWxsPSIjZmZmIiAvPgogIDxjaXJjbGUgY3g9IjI1MCIgY3k9IjE1MCIgcj0iMSIgZmlsbD0iI2ZmZiIgLz4KICA8Y2lyY2xlIGN4PSIzNTAiIGN5PSIzMDAiIHI9IjEiIGZpbGw9IiNmZmYiIC8+Cjwvc3ZnPg==')] bg-repeat"></div>

                <!-- Header -->
                <div class="w-full max-w-6xl flex justify-between items-center mb-6 z-10 bg-white/10 backdrop-blur-xl rounded-[24px] border border-white/20 p-4 sm:px-8 shadow-2xl">
                    <div class="flex flex-col">
                        <h1 class="text-xl sm:text-3xl font-semibold tracking-wide text-white flex items-center gap-3 drop-shadow-lg">
                            <i data-lucide="circuit-board" class="w-8 h-8 sm:w-10 sm:h-10 text-[#7C9BFF]"></i>
                            ${l.title}
                        </h1>
                        <span class="text-white/70 font-medium tracking-wider text-sm mt-1">${levelName}</span>
                    </div>
                    
                    <div class="flex items-center gap-4 sm:gap-8">
                        ${renderLangToggle()}
                        <div class="h-10 w-px bg-white/20 hidden sm:block mx-2"></div>
                        ${timerHTML}
                        <div class="h-10 w-px bg-white/20 hidden sm:block"></div>
                        <button onclick="window.goToMenu()" class="hidden sm:flex items-center gap-2 px-4 py-2.5 rounded-[12px] hover:bg-white/10 transition-all text-white/70 hover:text-white text-sm font-medium tracking-wide">
                            ${l.menu}
                        </button>
                        <button onclick="window.resetLevel()" class="flex items-center gap-2 px-5 py-2.5 rounded-[16px] bg-white/10 hover:bg-white/20 backdrop-blur-md border border-white/20 transition-all text-white text-sm font-medium tracking-wide cursor-pointer shadow-lg hover:shadow-white/10">
                            <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
                            ${l.startOver}
                        </button>
                    </div>
                </div>

                <!-- Main Game Area -->
                <div class="w-full max-w-6xl flex flex-col lg:flex-row gap-6 z-10 flex-1 min-h-[600px] lg:max-h-[800px]">
                    
                    <!-- Inventory Panel -->
                    <div class="lg:w-80 bg-white/10 backdrop-blur-xl border border-white/20 rounded-[24px] p-6 flex flex-col gap-6 shadow-2xl">
                        <div class="flex flex-col gap-1">
                            <h2 class="text-white/70 text-sm font-semibold tracking-widest uppercase">${l.yourParts}</h2>
                        </div>
                        
                        <div class="flex flex-col gap-4">
                            <div onclick="window.setSelectedItem('battery')" class="p-4 rounded-[16px] backdrop-blur-md transition-all duration-300 ${invBatteryClass} ${selBatteryClass} flex items-center justify-between">
                                <div class="flex items-center gap-4">
                                    <div class="w-12 h-12 rounded-[12px] bg-white/10 border border-white/20 flex items-center justify-center shadow-inner backdrop-blur-sm">
                                        <i data-lucide="battery" class="w-6 h-6 text-white"></i>
                                    </div>
                                    <div class="flex flex-col">
                                        <span class="text-white font-medium text-base">${l.battery}</span>
                                        <span class="text-white/60 text-xs">${l.powerSource}</span>
                                    </div>
                                </div>
                                <span class="font-mono font-bold text-xl px-2 ${txtBatteryClass}">${inventory.battery}</span>
                            </div>

                            <div onclick="window.setSelectedItem('switch')" class="p-4 rounded-[16px] backdrop-blur-md transition-all duration-300 ${invSwitchClass} ${selSwitchClass} flex items-center justify-between">
                                <div class="flex items-center gap-4">
                                    <div class="w-12 h-12 rounded-[12px] bg-white/10 border border-white/20 flex items-center justify-center shadow-inner backdrop-blur-sm">
                                        <i data-lucide="toggle-right" class="w-6 h-6 text-white"></i>
                                    </div>
                                    <div class="flex flex-col">
                                        <span class="text-white font-medium text-base">${l.switch}</span>
                                        <span class="text-white/60 text-xs">${l.circuitGate}</span>
                                    </div>
                                </div>
                                <span class="font-mono font-bold text-xl px-2 ${txtSwitchClass}">${inventory.switch}</span>
                            </div>
                        </div>
                        
                        <div class="mt-auto p-5 rounded-[16px] bg-black/20 backdrop-blur-md border border-white/10 text-white/80 text-sm leading-relaxed shadow-inner">
                            <span class="text-white font-semibold text-base block mb-2 drop-shadow-md">${l.guide}</span> 
                            <ul class="list-disc pl-4 space-y-2">
                                <li>${l.rule1}</li>
                                <li>${l.rule2}</li>
                                <li>${l.rule3}</li>
                            </ul>
                        </div>
                    </div>

                    <!-- The Circuit Board -->
                    <div class="flex-1 bg-white/[0.03] backdrop-blur-2xl rounded-[24px] border border-white/20 relative overflow-hidden shadow-[0_8px_32px_rgba(0,0,0,0.5)] flex items-center justify-center min-h-[400px]">
                        
                        <svg class="absolute inset-0 w-full h-full pointer-events-none" style="z-index: 0">
                            <defs>
                                <filter id="neonGlowRed" x="-50%" y="-50%" width="200%" height="200%">
                                    <feGaussianBlur stdDeviation="3" result="blur1" />
                                    <feGaussianBlur stdDeviation="6" result="blur2" />
                                    <feMerge><feMergeNode in="blur2" /><feMergeNode in="blur1" /><feMergeNode in="SourceGraphic" /></feMerge>
                                </filter>
                                <filter id="neonGlowBlue" x="-50%" y="-50%" width="200%" height="200%">
                                    <feGaussianBlur stdDeviation="3" result="blur1" />
                                    <feGaussianBlur stdDeviation="6" result="blur2" />
                                    <feMerge><feMergeNode in="blur2" /><feMergeNode in="blur1" /><feMergeNode in="SourceGraphic" /></feMerge>
                                </filter>
                                <filter id="neonGlowPurple" x="-50%" y="-50%" width="200%" height="200%">
                                    <feGaussianBlur stdDeviation="3" result="blur1" />
                                    <feGaussianBlur stdDeviation="6" result="blur2" />
                                    <feMerge><feMergeNode in="blur2" /><feMergeNode in="blur1" /><feMergeNode in="SourceGraphic" /></feMerge>
                                </filter>
                            </defs>
                            ${edgesHTML}
                        </svg>

                        ${nodesHTML}
                        ${overlaysHTML}
                    </div>
                </div>
            `;
        };

        const renderApp = () => {
            const root = document.getElementById('root');
            if (appState === 'start') {
                root.innerHTML = renderStartScreen();
            } else {
                root.innerHTML = renderGameScreen();
            }
            // Re-initialize Lucide Icons on the newly injected HTML
            lucide.createIcons();
        };

        // Initialize App
        window.onload = () => {
            renderApp();
        };

    </script>
</body>
</html>
