name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build All
        run: |
          set -x
          # Build Admin
          cd "Admin Portal"
          npm install > ../admin_install.log 2>&1
          npm run build > ../admin_build.log 2>&1
          cd ..
          
          # Build Student
          cd "Student portal"
          npm install > ../student_install.log 2>&1
          npm run build > ../student_build.log 2>&1
          cd ..
          
          # Build Teacher
          cd "Teacher Portal"
          npm install > ../teacher_install.log 2>&1
          npm run build > ../teacher_build.log 2>&1
          cd ..
          
          # Assemble Public
          mkdir -p public
          cp -r "Landing Page"/* public/
          mkdir -p public/admin public/student public/teacher
          cp -r "Admin Portal"/dist/* public/admin/
          cp -r "Student portal"/dist/* public/student/
          cp -r "Teacher Portal"/dist/* public/teacher/

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ./*.log

      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
