      try {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return;
        const ctx = new AudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);

        // High-tech minimal tick sound
        osc.type = 'sine';
        osc.frequency.setValueAtTime(1200, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.05);

        gain.gain.setValueAtTime(0, ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0.15, ctx.currentTime + 0.005);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);

        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.06);
      } catch (e) { }

    function App() {

      const [bulbOnUi, setBulbOnUi] = useState(true);
      const [is3DMode, setIs3DMode] = useState(true);

      const canvasRef = useRef(null);
      const sceneRef = useRef(null);
      const animationFrameRef = useRef(null);
      const bulbStateRef = useRef(true);
      const audio3DRef = useRef(null);
      const audio2DRef = useRef(null);

      // Synchronise audio between 2D and 3D modes
      useEffect(() => {
        const fromMedia = is3DMode ? audio2DRef.current : audio3DRef.current;
        const toMedia = is3DMode ? audio3DRef.current : audio2DRef.current;

        if (fromMedia && toMedia) {
          const wasPlaying = !fromMedia.paused;
          const targetTime = fromMedia.currentTime;
          const targetVol = fromMedia.volume;
          const targetMuted = fromMedia.muted;

          fromMedia.pause();

          const applySync = () => {
            toMedia.currentTime = targetTime;
            toMedia.volume = targetVol;
            toMedia.muted = targetMuted;
            if (wasPlaying) {
              toMedia.play().catch((e) => console.log('Autoplay prevented:', e));
            }
          };

          if (toMedia.readyState >= 1) { // 1 = HAVE_METADATA
            applySync();
          } else {
            const onMeta = () => {
              toMedia.removeEventListener('loadedmetadata', onMeta);
              applySync();
            };
            toMedia.addEventListener('loadedmetadata', onMeta);
            toMedia.load();
          }
        }
      }, [is3DMode]);

      const activeTopic = CHAPTER_DATA[language][activeTopicIndex];
      const activeSubtopic = activeTopic.subtopics[activeSubtopicIndex];

        if (window.THREE) {

          canvasRef.current.appendChild(renderer.domElement);

          sceneRef.current = { scene, camera, renderer };

        const createShapeWithHole = (w, h, holeRadius) => {
          const shape = new THREE.Shape();
          shape.moveTo(-w / 2, -h / 2); shape.lineTo(w / 2, -h / 2);
          shape.lineTo(w / 2, h / 2); shape.lineTo(-w / 2, h / 2); shape.lineTo(-w / 2, -h / 2);
          const hole = new THREE.Path();
          hole.absarc(0, 0, holeRadius, 0, Math.PI * 2, false);
          shape.holes.push(hole);
          return new THREE.ExtrudeGeometry(shape, { depth: 0.05, bevelEnabled: false });
        };

          const dirLight = new THREE.DirectionalLight(0xffeedd, 4.5);
          dirLight.position.set(5, 8, 6); dirLight.castShadow = true; dirLight.shadow.mapSize.width = 1024; dirLight.shadow.mapSize.height = 1024;
          dirLight.shadow.camera.left = -10; dirLight.shadow.camera.right = 10; dirLight.shadow.camera.top = 10; dirLight.shadow.camera.bottom = -10; dirLight.shadow.bias = -0.001; scene.add(dirLight);

          const virtualLight = new THREE.DirectionalLight(0xffeedd, 4.5);
          virtualLight.position.set(5, 8, -6); virtualLight.castShadow = true; virtualLight.shadow.mapSize.width = 1024; virtualLight.shadow.mapSize.height = 1024;
          virtualLight.shadow.camera.left = -10; virtualLight.shadow.camera.right = 10; virtualLight.shadow.camera.top = 10; virtualLight.shadow.camera.bottom = -10; virtualLight.shadow.bias = -0.001; scene.add(virtualLight);

          scene.add(new THREE.AmbientLight(0xffffff, 0.25));

          const backWall = new THREE.Mesh(new THREE.PlaneGeometry(40, 25), new THREE.MeshStandardMaterial({ color: 0x1f2937, roughness: 1 })); backWall.position.set(0, 5, -15); scene.add(backWall);

          const floorCanvas = document.createElement('canvas'); floorCanvas.width = 512; floorCanvas.height = 512; const ctx = floorCanvas.getContext('2d');
          ctx.fillStyle = '#64748b'; ctx.fillRect(0, 0, 512, 512); ctx.fillStyle = '#475569';
          for (let i = 0; i < 8; i++) { for (let j = 0; j < 8; j++) { if ((i + j) % 2 === 0) ctx.fillRect(i * 64, j * 64, 64, 64); } }

          const floor = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), new THREE.MeshStandardMaterial({ map: floorTex, roughness: 0.3, metalness: 0.2 }));

          const frameB = new THREE.Mesh(new THREE.BoxGeometry(10.6, 0.3, 0.3), frameMat); frameB.position.y = -3.65;
          const mirrorGroup = new THREE.Group(); mirrorGroup.add(mirror, frameL, frameR, frameT, frameB); mirrorGroup.position.y = 1.5;
          mirrorGroup.children.forEach(c => { c.castShadow = true; c.receiveShadow = true; }); scene.add(mirrorGroup);

          const createBoy = () => {
            const group = new THREE.Group();
            const skinMat = new THREE.MeshStandardMaterial({ color: 0xffa07a, roughness: 0.4, side: THREE.DoubleSide });
            const shirtMat = new THREE.MeshStandardMaterial({ color: 0xff1144, roughness: 0.6, side: THREE.DoubleSide });
            const pantsMat = new THREE.MeshStandardMaterial({ color: 0x0044cc, roughness: 0.7, side: THREE.DoubleSide });
            const hairMat = new THREE.MeshStandardMaterial({ color: 0x221100, roughness: 0.9, side: THREE.DoubleSide });
            const featureMat = new THREE.MeshStandardMaterial({ color: 0x111111, side: THREE.DoubleSide });
            const tieMat = new THREE.MeshStandardMaterial({ color: 0xffcc00, side: THREE.DoubleSide });
            const pocketMat = new THREE.MeshStandardMaterial({ color: 0x880022, roughness: 0.8, side: THREE.DoubleSide });

            const addPart = (geom, mat, x, y, z) => { const mesh = new THREE.Mesh(geom, mat); mesh.position.set(x, y, z); mesh.castShadow = true; mesh.receiveShadow = true; return mesh; };

            group.add(addPart(new THREE.CylinderGeometry(0.2, 0.22, 1.4), pantsMat, 0.25, 0.7, 0));
            group.add(addPart(new THREE.CylinderGeometry(0.2, 0.22, 1.4), pantsMat, -0.25, 0.7, 0));
            group.add(addPart(new THREE.BoxGeometry(1.1, 1.4, 0.5), shirtMat, 0, 2.1, 0));
            group.add(addPart(new THREE.BoxGeometry(0.12, 0.8, 0.05), tieMat, 0, 2.1, 0.26));
            group.add(addPart(new THREE.BoxGeometry(0.25, 0.25, 0.05), pocketMat, -0.28, 2.3, 0.26)); // Pocket on right chest

            group.add(addPart(new THREE.BoxGeometry(0.7, 0.7, 0.7), skinMat, 0, 3.15, 0));
            group.add(addPart(new THREE.BoxGeometry(0.75, 0.2, 0.75), hairMat, 0, 3.6, 0));

            group.add(addPart(new THREE.SphereGeometry(0.06), featureMat, 0.15, 3.25, 0.35));
            group.add(addPart(new THREE.SphereGeometry(0.06), featureMat, -0.15, 3.25, 0.35));
            group.add(addPart(new THREE.BoxGeometry(0.2, 0.04, 0.02), featureMat, 0, 3.0, 0.35));

            const pivotL = new THREE.Group(); pivotL.position.set(0.65, 2.6, 0);
            pivotL.add(addPart(new THREE.CylinderGeometry(0.15, 0.15, 1.2), shirtMat, 0, -0.5, 0), addPart(new THREE.SphereGeometry(0.18), skinMat, 0, -1.1, 0));
            group.add(pivotL); group.userData.pivotL = pivotL;

            const pivotR = new THREE.Group(); pivotR.position.set(-0.65, 2.6, 0);
            pivotR.add(addPart(new THREE.CylinderGeometry(0.15, 0.15, 1.2), shirtMat, 0, -0.5, 0), addPart(new THREE.SphereGeometry(0.18), skinMat, 0, -1.1, 0));
            group.add(pivotR); group.userData.pivotR = pivotR;

            return group;
          }

          const realObj = createBoy(); realObj.position.set(0, -2, 3); realObj.rotation.y = Math.PI; scene.add(realObj);
          const virtualObj = createBoy(); virtualObj.position.set(0, -2, -3); virtualObj.rotation.y = Math.PI; virtualObj.scale.z = -1; scene.add(virtualObj);

          if (subId === 0) {
            updateLogic = (time) => {
              const bob = Math.sin(time * 2) * 0.05; realObj.position.y = -2 + bob; virtualObj.position.y = -2 + bob;
              realObj.userData.pivotR.rotation.x = Math.sin(time) * 0.1; virtualObj.userData.pivotR.rotation.x = realObj.userData.pivotR.rotation.x;
              realObj.userData.pivotL.rotation.x = Math.sin(time + Math.PI) * 0.1; virtualObj.userData.pivotL.rotation.x = realObj.userData.pivotL.rotation.x;
            };
          } else {
            updateLogic = (time) => {
              const wave = Math.sin(time * 5) * 0.4;
              realObj.userData.pivotR.rotation.x = Math.PI * 0.8; realObj.userData.pivotR.rotation.z = -0.3 + wave;
              virtualObj.userData.pivotR.rotation.x = realObj.userData.pivotR.rotation.x; virtualObj.userData.pivotR.rotation.z = realObj.userData.pivotR.rotation.z;
              realObj.userData.pivotL.rotation.x = 0; virtualObj.userData.pivotL.rotation.x = 0;
            }
          }
        }
        else if (topicId === "11.7") {
          // PINHOLE CAMERA (Diagram Match)
          camera.position.set(7, 5, 8); camera.lookAt(0, 0, 0);

          scene.add(new THREE.AmbientLight(0xffffff, 0.7));
          const dLight = new THREE.DirectionalLight(0xffffff, 2); dLight.position.set(-5, 5, 5); scene.add(dLight);

          const realObj = createLetterF(0x00cc00, 0.3, false); realObj.position.set(0, 0, 5); scene.add(realObj);

          const boxMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, side: THREE.DoubleSide, transparent: true, opacity: 0.3 });
          const solidBoxMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa });
          const frontWall = new THREE.Mesh(createShapeWithHole(4, 4, 0.2), solidBoxMat); frontWall.position.set(0, 0, 0); scene.add(frontWall);

          const film = new THREE.Mesh(new THREE.PlaneGeometry(4, 4), new THREE.MeshPhysicalMaterial({ color: 0x88eebb, side: THREE.DoubleSide, transmission: 0.9, transparent: true, opacity: 1.0, roughness: 0.4 })); film.position.set(0, 0, -4); scene.add(film);

          const addWall = (geom, rx, ry, px, py, pz) => { const w = new THREE.Mesh(geom, boxMat); w.rotation.x = rx; w.rotation.y = ry; w.position.set(px, py, pz); scene.add(w); };
          addWall(new THREE.PlaneGeometry(4, 4), Math.PI / 2, 0, 0, 2, -2); // Top
          addWall(new THREE.PlaneGeometry(4, 4), Math.PI / 2, 0, 0, -2, -2); // Bottom
          addWall(new THREE.PlaneGeometry(4, 4), 0, Math.PI / 2, 2, 0, -2); // Side1
          addWall(new THREE.PlaneGeometry(4, 4), 0, Math.PI / 2, -2, 0, -2); // Side2

          // Edge highlights for the box to look diagrammatic
          const edgesGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(4, 4, 4));
          const edges = new THREE.LineSegments(edgesGeo, new THREE.LineBasicMaterial({ color: 0x444444 }));
          edges.position.set(0, 0, -2); scene.add(edges);

          const projectedObj = createLetterF(0x00cc00, 0.05, true); projectedObj.position.set(0, 0, -3.95); projectedObj.rotation.z = Math.PI; projectedObj.scale.set(0.8, 0.8, 0.8); scene.add(projectedObj);

          // Thick Volumetric Light Rays
          const createThickRay = (color) => {
            const geom = new THREE.CylinderGeometry(0.02, 0.02, 1, 8);
            geom.rotateX(Math.PI / 2); geom.translate(0, 0, 0.5); // Origin at start, pointing Z
            return new THREE.Mesh(geom, new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.8 }));
          };
          const updateRay = (ray, pStart, pEnd) => { ray.position.copy(pStart); ray.lookAt(pEnd); ray.scale.set(1, 1, pStart.distanceTo(pEnd)); };

          const rayTop = createThickRay(0x00ff00), rayMid = createThickRay(0xff0000), rayBot = createThickRay(0x0000ff);
          scene.add(rayTop, rayMid, rayBot);

          updateLogic = (time) => {
            const yOffset = Math.sin(time) * 0.5; realObj.position.y = yOffset; projectedObj.position.y = -yOffset * 0.8;

            const topY = 1 + yOffset, midY = 0.1 + yOffset, botY = -1 + yOffset;
            updateRay(rayTop, new THREE.Vector3(0.1, topY, 5), new THREE.Vector3(-0.08, -topY * 0.8, -4));
            updateRay(rayMid, new THREE.Vector3(-0.1, midY, 5), new THREE.Vector3(0.08, -midY * 0.8, -4));
            updateRay(rayBot, new THREE.Vector3(-0.3, botY, 5), new THREE.Vector3(0.24, -botY * 0.8, -4));
          };
        }

        const clock = new THREE.Clock();
        // IFP_VISIBLE is set by perf_optimizer.js when loaded in the parent shell.

        // rendering — only skip when explicitly === false (page hidden by OS/tab).
        const animate = () => { animationFrameRef.current = requestAnimationFrame(animate); if (window.IFP_VISIBLE === false) return; updateLogic(clock.getElapsedTime()); renderer.render(scene, camera); };


        if (animationFrameRef.current) cancelAnimationFrame(animationFrameRef.current);
        animate();

        // Resize Observer automatically guarantees mathematical centering even during UI layout shifts
        const handleResize = () => {

        return () => {
          resizeObserver.disconnect();
          window.removeEventListener('resize', handleResize);
          if (animationFrameRef.current) cancelAnimationFrame(animationFrameRef.current);
        };
      }, [threeLoaded, activeTopicIndex, activeSubtopicIndex]);

              <button onClick={() => { playClickSound(); setActiveTopicIndex((p) => (p + 1) % CHAPTER_DATA[language].length); setActiveSubtopicIndex(0); bulbStateRef.current = true; setBulbOnUi(true); }} className="hidden md:flex p-4 rounded-full bg-white/20 border-2 border-white/50 text-white shadow-[0_0_15px_rgba(255,255,255,0.2)] hover:bg-white/40 hover:scale-110 hover:shadow-[0_0_25px_rgba(255,255,255,0.4)] transition-all backdrop-blur-md cursor-pointer z-50 chapter-nav-arrow">

    function titleCase(str) {
      return str.toLowerCase().split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
